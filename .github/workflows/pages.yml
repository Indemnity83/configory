name: Deploy Docs

on:
  push:
    branches: [main]
    paths: ['docs/**', '.github/workflows/pages.yml', '.release-please-manifest.json']
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Inject latest release version into docs
        run: |
          set -euo pipefail
          VERSION="$(jq -r '."."' .release-please-manifest.json)"
          [ -n "$VERSION" ] && [ "$VERSION" != "null" ] || { echo "no version in manifest"; exit 1; }
          sed -i "s/%%VERSION%%/${VERSION}/g" docs/getting-started/installation.md
          echo "Injected version $VERSION into installation docs"

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

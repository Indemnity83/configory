name: Check PR

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: lint (pr)
    runs-on: ubuntu-latest

    steps:
      # Dependabot titles its PRs "build: Bump ..." / "ci: Bump ..." with a capitalized
      # "Bump" that can't be configured away, which trips the lowercase-subject rule below.
      # Skip the check for Dependabot; the job still runs and reports "lint (pr)" green so the
      # required status check stays satisfied.
      - if: ${{ github.actor != 'dependabot[bot]' }}
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            deprecate
            remove
            security
            perf
            docs
            refactor
            test
            build
            ci
            chore
            revert

          # Focused single-module library: no scopes.
          requireScope: false

          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            should start with a lowercase letter.

            Good:
              fix: prevent a stuck config value
              feat: add long range constraints

            Bad:
              Fix: Prevent a stuck config value

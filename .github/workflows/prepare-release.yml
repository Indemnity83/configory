name: Prepare Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # A PAT (not GITHUB_TOKEN) so the release-please PR runs CI and the published release
          # triggers Build (Release). Events raised by GITHUB_TOKEN don't start other workflows.
          token: ${{ secrets.PERSONAL_TOKEN }}

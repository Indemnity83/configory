name: Prepare Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # GITHUB_TOKEN-opened release PRs don't trigger other workflows; use a PAT to run CI on them.
          token: ${{ secrets.GITHUB_TOKEN }}

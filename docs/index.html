<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Configory</title>
    <meta name="description" content="Convention-based configuration for Minecraft mods." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css"
    />
    <style>
      :root {
        --theme-color: #4f46e5;
        --base-font-size: 16px;
        --content-max-width: 56em;
        --sidebar-width: 18rem;
        --code-font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        --code-inline-background: rgba(79, 70, 229, 0.08);
      }

      .app-name-link img,
      .sidebar .app-name {
        margin-bottom: 0.5rem;
      }

      .markdown-section code[class*="lang-"],
      .markdown-section pre {
        font-size: 0.9em;
      }

      .cover-main .buttons a {
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="app">Loading…</div>
    <script>
      window.$docsify = {
        name: "Configory",
        repo: "Indemnity83/configory",
        homepage: "getting-started/introduction.md",
        loadSidebar: true,
        subMaxLevel: 2,
        auto2top: true,
        coverpage: false,
        alias: {
          "/.*/_sidebar.md": "/_sidebar.md",
        },
        notFoundPage: true,
        search: {
          depth: 3,
          noData: "No results.",
          placeholder: "Search…",
        },
        pagination: {
          crossChapter: true,
          crossChapterText: true,
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts@1"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  </body>
</html>
